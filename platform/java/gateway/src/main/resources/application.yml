# ============================================================
# Gateway 配置
# ============================================================
server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
      config:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:dev}
        file-extension: yml
        shared-configs:
          - data-id: common-config.yml
            group: DEFAULT_GROUP
            refresh: true
    gateway:
      # 所有外部 API 都通过 Redis 令牌桶限流；用户身份由 JwtAuthFilter 写入 X-User-Id。
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${GATEWAY_RATE_LIMIT_PER_SECOND:5}
            redis-rate-limiter.burstCapacity: ${GATEWAY_RATE_LIMIT_BURST:15}
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@userKeyResolver}"
      # 全局 CORS 配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${CORS_ALLOWED_ORIGINS:http://localhost:8501}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: Authorization,Content-Type,Accept
            allowCredentials: true

  # Redis (限流计数)
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # 排除 Gateway 不需要的自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,prometheus
  endpoint:
    health:
      show-details: always

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:smart-doc-search-jwt-secret-key-2024-min-length-32}

# 日志
logging:
  level:
    com.smartdoc.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

# ============================================================
# RAG Service Deployment (示例 — 核心服务)
# 其他服务 (gateway/user/document/evaluation) 结构类似
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: smart-doc-search
  labels:
    app: rag-service
spec:
  replicas: 3                       # 核心服务, 多副本
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8082"
    spec:
      containers:
        - name: rag-service
          image: smart-doc-search/rag-service:latest
          ports:
            - containerPort: 8082
              protocol: TCP
          envFrom:
            - configMapRef:
                name: smartdoc-config
            - secretRef:
                name: smartdoc-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: smart-doc-search
spec:
  selector:
    app: rag-service
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP

---
# HPA (水平自动扩缩容)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-service-hpa
  namespace: smart-doc-search
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

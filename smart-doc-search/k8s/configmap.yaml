# ============================================================
# K8s ConfigMap — 非敏感公共配置
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartdoc-config
  namespace: smart-doc-search
data:
  # Nacos
  NACOS_HOST: "nacos-service"
  NACOS_PORT: "8848"
  NACOS_NAMESPACE: "production"

  # MySQL
  MYSQL_HOST: "mysql-service"
  MYSQL_PORT: "3306"

  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"

  # ChromaDB
  CHROMADB_HOST: "http://chromadb-sidecar-service"
  CHROMADB_PORT: "8001"

  # MinIO
  MINIO_ENDPOINT: "http://minio-service:9000"

  # RocketMQ
  ROCKETMQ_NAMESERVER: "rocketmq-namesrv-service:9876"

  # 检索默认参数
  RETRIEVAL_TOP_K: "5"
  SIMILARITY_THRESHOLD: "0.5"
  RETRIEVAL_MULTIPLIER: "3"

  # JWT 有效期
  JWT_ACCESS_EXPIRE_MS: "900000"
  JWT_REFRESH_EXPIRE_MS: "604800000"

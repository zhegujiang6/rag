name: doc-search

services:
  chroma:
    image: chromadb/chroma:0.5.23
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - doc-search-network

  # ── RAG 微服务（FastAPI）─────────────────────────────────────
  rag-server:
    build:
      context: .
      dockerfile: Dockerfile.rag
    restart: unless-stopped
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-doc_search}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-${LLM_API_KEY}}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-${LLM_API_BASE:-https://api.openai.com/v1}}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - UPLOAD_DIR=/app/uploads
      - DEBUG=${DEBUG:-false}
      - RAG_API_KEY=${RAG_API_KEY:-}
      - RAG_SERVER_PORT=8100
      - RAG_SERVER_WORKERS=${RAG_SERVER_WORKERS:-1}
      - RAG_MAX_CONCURRENT_REQUESTS=${RAG_MAX_CONCURRENT_REQUESTS:-20}
      - LLM_MAX_CONCURRENCY=${LLM_MAX_CONCURRENCY:-8}
      - EMBEDDING_MAX_CONCURRENCY=${EMBEDDING_MAX_CONCURRENCY:-16}
    ports:
      - "${RAG_SERVER_PORT:-8100}:8100"
    depends_on:
      mysql:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - doc-search-network

  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: doc-search-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-doc_search}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doc-search-network

  # Streamlit App (single service)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc-search-app
    restart: unless-stopped
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-doc_search}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-3.5-turbo}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-${LLM_API_KEY}}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-${LLM_API_BASE:-https://api.openai.com/v1}}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - UPLOAD_DIR=/app/uploads
      - DEBUG=${DEBUG:-false}
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - doc-search-network

volumes:
  mysql_data:
  upload_data:
  chroma_data:

networks:
  doc-search-network:
    driver: bridge
